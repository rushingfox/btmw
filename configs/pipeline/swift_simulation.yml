# Define the system of units to use internally. 
InternalUnitSystem:
  UnitMass_in_cgs:     1.98841e43    # 10^10 M_sun in grams
  UnitLength_in_cgs:   3.08567758e24 # Mpc in centimeters
  UnitVelocity_in_cgs: 1e5           # km/s in centimeters per second
  UnitCurrent_in_cgs:  1             # Amperes
  UnitTemp_in_cgs:     1             # Kelvin

# Cosmological parameters
Cosmology:
  h:              0.702        # Reduced Hubble constant
  a_begin:        0.00990099     # Initial scale-factor of the simulation
  a_end:          1.0           # Final scale factor of the simulation
  Omega_cdm:      0.2265     # Cold Dark Matter density parameter
  Omega_lambda:   0.728         # Dark-energy density parameter
  Omega_b:        0.0455     # Baryon density parameter

# Parameters governing the time integration
TimeIntegration:
# For cosmology run, the below two parameters are ignored(from https://swift.dur.ac.uk/docs/ParameterFiles/parameter_description.html#time-integration)
# time_begin: 0.    # The starting time of the simulation (in internal units).
# time_end:   1e-2  # The end time of the simulation (in internal units).
  dt_min:     1e-10 # The minimal time-step size of the simulation (in internal units).
  dt_max:     1e-2  # The maximal time-step size of the simulation (in internal units).
  
# Parameters governing the snapshots
Snapshots:
  basename:            m12i_cdmo
  scale_factor_first:  0.01  # Scale-factor of the first snaphot (cosmological run)
  delta_time:          1.10  # Time difference between consecutive outputs (in internal units)
  compression:         1
  invoke_fof:          1

# Parameters governing the conserved quantities statistics
Statistics:
  scale_factor_first:  0.01 # Scale-factor of the first stat dump (cosmological run)
  delta_time:          1.05 # Time between statistics output

# Parameters for the self-gravity scheme
Gravity:
  eta:                      0.025     # Constant dimensionless multiplier for time integration.
  MAC:                      adaptive
  epsilon_fmm:              0.001
  theta_cr:                 0.7       # Opening angle (Multipole acceptance criterion)
  mesh_side_length:         414 #number of particle^(1/3)=413, must be even number
  comoving_DM_softening:         0.00020751953 # Comoving DM softening length (in internal units). 0.02*85/(2^13)
  max_physical_DM_softening:     0.00020751953 # Max physical DM softening length (in internal units). 0.02*85/(2^13)
  softening_ratio_background:    0.04      # Fraction of the mean inter-particle separation to use as Plummer-equivalent softening for the background DM particles.
# Parameters related to the initial conditions
InitialConditions:
  file_name:  ./IC/ics_swift_higher_m12i_cdmo.hdf5
  periodic:   1
  cleanup_h_factors: 0               # Remove the h-factors inherited from Gadget
  cleanup_velocity_factors: 0        # Remove the sqrt(a) factor in the velocities inherited from Gadget

# Parameters related to the Friends-Of-Friends halo finding
FOF:
  basename:                        fof_output  # Filename for the FOF outputs (Unused when FoF is only run to seed BHs).
  min_group_size:                  128         # The minimum no. of particles required for a group.
  linking_length_ratio:            0.2         # Linking length in units of the main inter-particle separation.
  seed_black_holes_enabled:        0           # Enable (1) or disable (0) seeding of black holes in FoF groups
  absolute_linking_length:         -1.         # (Optional) Absolute linking length (in internal units). When not set to -1, this will overwrite the linking length computed from 'linking_length_ratio'.
  group_id_default:                2147483647  # (Optional) Sets the group ID of particles in groups below the minimum size. Defaults to 2^31 - 1 if unspecified. Has to be positive.
  group_id_offset:                 1           # (Optional) Sets the offset of group ID labeling. Defaults to 1 if unspecified.
  output_list_on:                  1           # (Optional) Enable the output list
  output_list:       ./output_list_fof.txt     # (Optional) File containing the output times (see documentation in "Parameter File" section)